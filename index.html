<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Let Me Call You Sweetheart</title>
<meta name="description" content="An ink-doodle lyric page for a 1910 love song. One button. Press play.">
<meta name="theme-color" content="#fdfbf7">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fdfbf7;
    --ink:#1a1a1a;
    --ink-dim:#8c8a85;
    --ink-faint:#c9c6bf;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Caveat',cursive;
    overflow-x:hidden;
    touch-action:pan-y;
    position:relative;
  }
  ::selection{background:var(--ink);color:var(--paper);}

  /* ---------- PAPER TEXTURE ---------- */
  #paper-grain{
    position:fixed; inset:0; z-index:5; pointer-events:none;
    background-image:url('assets/tex/grain.png');
    background-size:128px 128px;
    opacity:.5;
    mix-blend-mode:multiply;
  }
  #vignette{
    position:fixed; inset:0; z-index:4; pointer-events:none;
    background:radial-gradient(120% 90% at 50% 40%, transparent 55%, rgba(0,0,0,.05) 100%);
  }

  /* ---------- AMBIENT LIFE — so the page never reads as dead/static ---------- */
  #ambient-glow{
    position:fixed; inset:-15%; z-index:1; pointer-events:none;
    background:radial-gradient(closest-side, rgba(26,26,26,.055), transparent 72%);
    animation:glow-breathe 7s ease-in-out infinite;
  }
  @keyframes glow-breathe{ 0%,100%{ opacity:.5; transform:scale(1); } 50%{ opacity:1; transform:scale(1.1); } }
  #ink-progress{
    position:fixed; left:0; top:0; bottom:0; width:3px; z-index:6;
    background:rgba(26,26,26,.08);
  }
  #ink-progress-fill{
    position:absolute; left:0; bottom:0; width:100%; height:0%;
    background:var(--ink); opacity:.5;
  }
  @media (prefers-reduced-motion: reduce){ #ambient-glow{ animation:none; } }

  /* ---------- STAGE — a fixed teleprompter: current line huge & sharp,
     next line already rising into view below (anticipation), previous
     line fading away above. Nothing about this page holds still. ---------- */
  #stage{ position:fixed; inset:0; z-index:2; overflow:hidden; }
  #stack{ position:absolute; left:0; right:0; top:50%; max-width:760px; margin:0 auto; height:0; }
  .line-slot{
    position:absolute; left:50%; top:0; width:100%; padding:0 1.5rem;
    transform:translate(-50%,-50%);
    text-align:center; will-change:transform, opacity;
  }
  .lyric-line{
    display:inline-block; font-weight:700; line-height:1.1;
    font-size:clamp(2.3rem, 9vw, 5.4rem);
    color:var(--ink);
  }
  .lyric-line.spoken{ font-weight:600; font-size:clamp(1.35rem,4.4vw,2rem); color:var(--ink-dim); }

  /* ---------- WORDS — sung in real time from actual word-level timestamps ---------- */
  .word{
    display:inline-block; color:var(--ink-faint); transition:color .22s ease;
    background-image:linear-gradient(var(--ink),var(--ink));
    background-repeat:no-repeat; background-position:0 100%;
    background-size:var(--fill,0%) .09em;
    padding-bottom:.05em;
  }
  .word.is-now{ color:var(--ink); animation:word-pop .35s ease-out; }
  .word.is-sung{ color:var(--ink); background-size:100% .09em; }
  @keyframes word-pop{ 0%{ transform:scale(.9); } 55%{ transform:scale(1.07); } 100%{ transform:scale(1); } }
  @media (prefers-reduced-motion: reduce){
    .word{ transition:none !important; }
    .word.is-now{ animation:none !important; }
  }

  .line-slot.is-current .lyric-line{ animation:line-breathe 3.6s ease-in-out infinite; }
  @keyframes line-breathe{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.018); } }
  .line-slot.is-current .lyric-line.fx-finale{ animation:finale-pulse 1.2s ease-in-out infinite alternate; }
  @keyframes finale-pulse{ 0%{ transform:scale(1); } 100%{ transform:scale(1.05); } }
  @media (prefers-reduced-motion: reduce){
    .line-slot{ transition:none !important; }
    .line-slot.is-current .lyric-line{ animation:none !important; }
  }

  .divider{ display:flex; align-items:center; justify-content:center; }
  .divider svg{ width:110px; height:16px; opacity:.4; }
  .divider path{ fill:none; stroke:var(--ink); stroke-width:2; stroke-linecap:round; }

  /* ---------- INK DOODLES — anchored to, and moving with, their own line ---------- */
  .doodle-wrap{ position:absolute; top:50%; pointer-events:none; z-index:1; }
  .doodle-wrap svg{ width:100%; height:100%; overflow:visible; }
  .doodle-wrap path, .doodle-wrap circle{ fill:none; stroke:var(--ink); vector-effect:non-scaling-stroke; }
  .doodle-wrap.side-left{ left:clamp(-30px, -12vw, 10px); }
  .doodle-wrap.side-right{ right:clamp(-30px, -12vw, 10px); }
  .doodle-wrap.accent{ width:clamp(130px, 26vw, 260px); }
  .doodle-wrap.ambient{ width:clamp(80px, 16vw, 150px); }
  @media (prefers-reduced-motion: reduce){
    .doodle-wrap path, .doodle-wrap circle{ transition:none !important; }
  }

  /* ---------- PLAY BUTTON — the only control ---------- */
  #play-btn{
    position:fixed; left:50%; bottom:6vh; z-index:50;
    width:84px; height:84px; margin-left:-42px;
    border:none; background:none; cursor:pointer; padding:0;
    -webkit-tap-highlight-color:transparent;
    animation:blob-breathe 4.5s ease-in-out infinite;
  }
  #play-btn:active .blob-shape{ transform:scale(.88) rotate(-6deg); }
  @keyframes blob-breathe{
    0%,100%{ transform:scale(1) rotate(0deg); } 50%{ transform:scale(1.045) rotate(2deg); }
  }
  .blob-shape{
    position:absolute; inset:0; transition:transform .45s cubic-bezier(.34,1.56,.64,1);
    filter:drop-shadow(0 10px 20px rgba(0,0,0,.22));
  }
  .blob-shape svg{ width:100%; height:100%; }
  .blob-shape path{ fill:var(--ink); }
  .icon-wrap{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:var(--paper); pointer-events:none;
  }
  .icon-wrap svg{ width:30px; height:30px; transition:opacity .3s ease, transform .4s cubic-bezier(.34,1.56,.64,1); }
  #icon-play{ transform:translateX(2px); }
  #icon-pause{ opacity:0; transform:scale(.6) rotate(-90deg); position:absolute; }
  #play-btn.is-playing #icon-play{ opacity:0; transform:scale(.6) rotate(90deg); }
  #play-btn.is-playing #icon-pause{ opacity:1; transform:scale(1) rotate(0deg); position:absolute; }
  .ink-ripple{
    position:absolute; inset:0; border-radius:50%; background:var(--ink);
    opacity:0; pointer-events:none;
  }
  .ink-ripple.firing{ animation:ripple .55s ease-out; }
  @keyframes ripple{ 0%{ opacity:.28; transform:scale(.7);} 100%{ opacity:0; transform:scale(1.7);} }
  @media (prefers-reduced-motion: reduce){
    #play-btn{ animation:none; }
  }
</style>
</head>

    { start: 95.70, end: 101.72, words:[{w:"In",s:95.70,e:97.10}, {w:"a",s:97.10,e:97.42}, {w:"land",s:97.42,e:98.20}, {w:"of",s:98.20,e:98.60}, {w:"love",s:98.60,e:99.60}, {w:"it",s:99.60,e:99.98}, {w:"seems",s:99.98,e:101.72}], doodle:'doodle-wildflower-2', side:'left', tier:'accent' },
    { start: 101.72, end: 110.88, words:[{w:"Just",s:101.72,e:103.58}, {w:"with",s:103.58,e:105.02}, {w:"you,",s:105.02,e:106.74}, {w:"just",s:106.74,e:108.02}, {w:"with",s:108.02,e:109.38}, {w:"you",s:109.38,e:110.88}], doodle:'doodle-dotbranch', side:'right', tier:'ambient' },
    { start: 113.32, end: 121.24, section:'Chorus (reprise)', words:[{w:"Let",s:113.32,e:114.72}, {w:"me",s:114.72,e:115.30}, {w:"call",s:115.30,e:115.92}, {w:"you",s:115.92,e:116.32}, {w:"sweetheart",s:116.32,e:116.92}, {w:"I'm",s:116.92,e:118.34}, {w:"in",s:118.34,e:118.48}, {w:"love",s:118.48,e:119.24}, {w:"with",s:119.24,e:120.38}, {w:"you",s:120.38,e:121.24}], doodle:'doodle-rose-2', side:'left', tier:'accent' },
    { start: 121.24, end: 130.34, words:[{w:"Let",s:121.24,e:123.30}, {w:"me",s:123.30,e:123.72}, {w:"hear",s:123.72,e:124.34}, {w:"you",s:124.34,e:124.70}, {w:"whisper",s:124.70,e:125.36}, {w:"that",s:125.36,e:126.52}, {w:"you",s:126.52,e:126.88}, {w:"love",s:126.88,e:127.72}, {w:"me",s:127.72,e:128.72}, {w:"too",s:128.72,e:130.34}], doodle:'doodle-berry', side:'right', tier:'ambient' },
    { start: 134.42, end: 142.44, words:[{w:"Keep",s:134.42,e:135.82}, {w:"the",s:135.82,e:136.16}, {w:"love",s:136.16,e:136.62}, {w:"light",s:136.62,e:137.14}, {w:"glowing",s:137.14,e:137.80}, {w:"in",s:137.80,e:138.94}, {w:"your",s:138.94,e:139.36}, {w:"eyes",s:139.36,e:140.52}, {w:"so",s:140.52,e:141.30}, {w:"true",s:141.30,e:142.44}], doodle:'doodle-daisy-2', side:'left', tier:'accent' },
    { start: 144.62, end: 163.08, fx:'fx-finale', words:[{w:"Let",s:144.62,e:146.02}, {w:"me",s:146.02,e:146.66}, {w:"call",s:146.66,e:147.64}, {w:"you",s:147.64,e:148.44}, {w:"sweetheart",s:148.44,e:150.52}, {w:"I'm",s:150.52,e:155.38}, {w:"in",s:155.38,e:155.94}, {w:"love",s:155.94,e:157.52}, {w:"with",s:157.52,e:159.98}, {w:"you",s:159.98,e:163.08}], doodle:'doodle-branch-2', side:'right', tier:'accent' },
    { start: 177.98, end: 179.38, section:'Outro', fx:'fx-finale', words:[{w:"Let",s:177.98,e:178.12}, {w:"me",s:178.12,e:178.26}, {w:"hear",s:178.26,e:178.40}, {w:"you",s:178.40,e:178.54}, {w:"whisper",s:178.54,e:178.68}, {w:"that",s:178.68,e:178.82}, {w:"you",s:178.82,e:178.96}, {w:"love",s:178.96,e:179.10}, {w:"me",s:179.10,e:179.24}, {w:"too",s:179.24,e:179.38}], doodle:'doodle-fern-2', side:'left', tier:'accent' },
  ];

  const GAP_DOODLES = {
    "9.00":   { doodle:'doodle-bud', side:'right' },
    "31.16":  { doodle:'doodle-star-2', side:'left' },
    "58.42":  { doodle:'doodle-fern-2', side:'right' },
    "93.38":  { doodle:'doodle-bud-2', side:'left' },
    "110.88": { doodle:'doodle-tulip', side:'right' },
    "130.34": { doodle:'doodle-dotbranch', side:'left' },
    "163.08": { doodle:'doodle-rose', side:'left', extra:{doodle:'doodle-branch', side:'right'} },
  };

  /* ---------------------------------------------------------------------
   * TIMELINE — auto-fills instrumental gaps so scroll height always maps
   * exactly to elapsed seconds, with zero unaccounted time.
   * ------------------------------------------------------------------- */
  function buildTimeline(lines, totalDuration){
    const sorted = [...lines].sort((a,b) => a.start - b.start);
    const timeline = [];
    let cursor = 0;
    for (const line of sorted){
      if (line.start - cursor > 0.6){
        timeline.push({ type:'gap', start: cursor, end: line.start });
      }
      timeline.push(Object.assign({}, line, { type: line.type || 'line', start: Math.max(line.start, cursor) }));
      cursor = Math.max(cursor, line.end);
    }
    if (totalDuration - cursor > 0.6){
      timeline.push({ type:'gap', start: cursor, end: totalDuration });
    } else if (totalDuration > cursor){
      timeline[timeline.length - 1].end = totalDuration;
    }
    return timeline;
  }

  /* ---------------------------------------------------------------------
   * STATE
   * ------------------------------------------------------------------- */
  const audio = document.getElementById('track');
  const stack = document.getElementById('stack');
  const progressFill = document.getElementById('ink-progress-fill');
  const playBtn = document.getElementById('play-btn');
  const ripple = playBtn.querySelector('.ink-ripple');

  let rafId = null;
  let currentSlot = null;
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const devTagMode = new URLSearchParams(location.search).get('tag') === '1';

  const TIMELINE = buildTimeline(LYRICS, TOTAL_DURATION);
  const slots = []; // { el, lineEl, start, end, center, doodles:[{wrap,shapes,revealed}], isGap }

  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

  /* ---------------------------------------------------------------------
   * DOODLES — cloned as real path/circle elements (not <use>) so each
   * stroke's own getTotalLength() drives a dashoffset reveal: they look
   * like they're being drawn in ink as their line approaches, which is
   * itself part of the anticipation — the drawing-in *is* the countdown.
   * ------------------------------------------------------------------- */
  function makeDoodle(symbolId, side, tier){
    const symbol = document.getElementById(symbolId);
    if (!symbol) return null;
    const wrap = document.createElement('div');
    wrap.className = 'doodle-wrap side-' + side + ' ' + tier;
    wrap.style.top = (28 + Math.random()*28) + '%';

    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.innerHTML = symbol.innerHTML;
    const tilt = (Math.random() * 20 - 10) + (side === 'left' ? -5 : 5);
    svg.style.transform = 'rotate(' + tilt + 'deg)';
    wrap.appendChild(svg);

    const shapes = Array.from(svg.querySelectorAll('path, circle'));
    shapes.forEach(el => {
      let len = 60;
      try { len = el.getTotalLength ? el.getTotalLength() : 60; } catch(e){}
      el.__len = len;
      el.style.strokeDasharray = len;
      el.style.strokeDashoffset = reducedMotion ? '0' : len;
      el.style.transition = reducedMotion ? 'none' : 'stroke-dashoffset 1.1s ease-out';
    });

    return {
      wrap, shapes, revealed: reducedMotion,
      maxOpacity: tier === 'accent' ? .6 : .24,
      bobPhase: Math.random() * Math.PI * 2,
      bobAmp: 5 + Math.random() * 4,
      bobSpeed: 0.5 + Math.random() * 0.3,
    };
  }

  function revealDoodle(d){
    if (d.revealed) return;
    d.revealed = true;
    d.shapes.forEach((el, i) => {
      el.style.transitionDelay = (i * 85) + 'ms';
      el.style.strokeDashoffset = '0';
    });
  }

  /* ---------------------------------------------------------------------
   * BUILD STAGE — every timeline entry becomes a positioned slot that
   * lives for the whole song; the render loop moves/fades all of them
   * continuously based on distance from "now", so there is always a
   * previous line receding, a current line sharp, and a next line already
   * visibly rising into place. That rising next line is the anticipation.
   * ------------------------------------------------------------------- */
  function buildStage(){
    let lastSection = null;
    TIMELINE.forEach((entry) => {
      const el = document.createElement('div');
      el.className = 'line-slot';

      let lineEl = null;
      let wordEls = [];
      if (entry.type !== 'gap'){
        if (entry.section && entry.section !== lastSection){
          lastSection = entry.section;
          const div = document.createElement('div');
          div.className = 'divider';
          div.innerHTML = '<svg viewBox="0 0 110 16"><path d="M2,8 Q20,2 38,9 T72,7 T108,8"/></svg>';
          el.appendChild(div);
        }
        lineEl = document.createElement('div');
        lineEl.className = 'lyric-line' + (entry.type === 'spoken' ? ' spoken' : '') + (entry.fx === 'fx-finale' ? ' fx-finale' : '');
        (entry.words || []).forEach((w, i) => {
          const span = document.createElement('span');
          span.className = 'word';
          span.textContent = w.w;
          lineEl.appendChild(span);
          if (i < entry.words.length - 1) lineEl.appendChild(document.createTextNode(' '));
          wordEls.push({ el: span, start: w.s, end: w.e });
        });
        el.appendChild(lineEl);
      }

      const doodles = [];
      if (entry.type === 'gap'){
        const cue = GAP_DOODLES[entry.start.toFixed(2)];
        if (cue){
          const d1 = makeDoodle(cue.doodle, cue.side, 'accent');
          if (d1){ el.appendChild(d1.wrap); doodles.push(d1); }
          if (cue.extra){
            const d2 = makeDoodle(cue.extra.doodle, cue.extra.side, 'ambient');
            if (d2){ el.appendChild(d2.wrap); doodles.push(d2); }
          }
        }
      } else if (entry.doodle){
        const d = makeDoodle(entry.doodle, entry.side || 'left', entry.tier || 'ambient');
        if (d){ el.appendChild(d.wrap); doodles.push(d); }
      }

      stack.appendChild(el);
      slots.push({
        el, lineEl, doodles, wordEls,
        start: entry.start, end: entry.end,
        center: (entry.start + entry.end) / 2,
        isGap: entry.type === 'gap',
      });
    });
  }

  /* ---------------------------------------------------------------------
   * THE ONLY ENGINE — every frame, every slot is positioned/faded purely
   * as a function of now vs. its own [start,end] window: 0 while t is
   * inside it (however long that line lasts), counting down to 0 while
   * upcoming, counting away after it ends. That distance-to-edge (not
   * distance-to-center) is what drives position/opacity, so a 14-second
   * line stays fully present for all 14 seconds instead of fading out
   * partway through just because its midpoint is far away. Nothing waits
   * for a scroll event; nothing is ever fully static.
   * ------------------------------------------------------------------- */
  function renderFrame(t){
    let active = null;

    for (const s of slots){
      const dt = t < s.start ? (s.start - t) : (t > s.end ? -(t - s.end) : 0);
      const absDt = Math.abs(dt);
      if (dt === 0) active = s;

      if (absDt > FADE_WINDOW + 1.2){
        if (s.el.style.display !== 'none') s.el.style.display = 'none';
        continue;
      }
      if (s.el.style.display === 'none') s.el.style.display = '';

      const y = dt * PX_PER_SEC;
      const opacity = clamp(1 - absDt / FADE_WINDOW, 0, 1);
      const scale = clamp(1 - absDt * 0.11, 0.55, 1);
      s.el.style.transform = 'translate(-50%,-50%) translateY(' + y.toFixed(1) + 'px) scale(' + scale.toFixed(3) + ')';
      s.el.style.opacity = opacity.toFixed(3);

      for (const d of s.doodles){
        d.wrap.style.opacity = (opacity * d.maxOpacity).toFixed(3);
        if (dt < REVEAL_LEAD) revealDoodle(d);
        if (!reducedMotion){
          const bob = Math.sin(t * d.bobSpeed + d.bobPhase) * d.bobAmp;
          d.wrap.style.transform = 'translateY(' + bob.toFixed(1) + 'px)';
        }
      }

      for (const wd of s.wordEls){
        const state = t >= wd.end ? 'sung' : (t >= wd.start ? 'now' : 'upcoming');
        if (wd.el.__state !== state){
          wd.el.__state = state;
          wd.el.classList.toggle('is-sung', state === 'sung');
          wd.el.classList.toggle('is-now', state === 'now');
        }
        if (state === 'now'){
          const frac = clamp((t - wd.start) / Math.max(0.05, wd.end - wd.start), 0, 1);
          wd.el.style.setProperty('--fill', (frac * 100).toFixed(1) + '%');
        }
      }
    }

    if (active !== currentSlot){
      if (currentSlot) currentSlot.el.classList.remove('is-current');
      currentSlot = active;
      if (currentSlot) currentSlot.el.classList.add('is-current');
    }

    progressFill.style.height = (clamp(t / TOTAL_DURATION, 0, 1) * 100).toFixed(2) + '%';
  }

  function autoTick(){
    if (audio.paused){ rafId = null; return; }
    const t = audio.currentTime;
    renderFrame(t);

    if (t >= TOTAL_DURATION - 0.15){
      cancelAnimationFrame(rafId); rafId = null;
      finishSong();
      return;
    }
    rafId = requestAnimationFrame(autoTick);
  }

  function finishSong(){
    playBtn.classList.remove('is-playing');
    audio.pause();
    audio.currentTime = 0;
    renderFrame(0);
  }

  /* ---------------------------------------------------------------------
   * PLAY BUTTON — the only control on the page
   * ------------------------------------------------------------------- */
  function fireRipple(){
    ripple.classList.remove('firing');
    void ripple.offsetWidth;
    ripple.classList.add('firing');
  }

  function togglePlay(){
    fireRipple();
    if (audio.paused){
      audio.play().catch(()=>{});
      playBtn.classList.add('is-playing');
      if (!rafId) rafId = requestAnimationFrame(autoTick);
    } else {
      audio.pause();
      playBtn.classList.remove('is-playing');
      if (rafId){ cancelAnimationFrame(rafId); rafId = null; }
    }
  }

  /* ---------------------------------------------------------------------
   * DEV TAG HELPER — ?tag=1 for re-timing a different recording quickly
   * ------------------------------------------------------------------- */
  function setupTagMode(){
    const panel = document.createElement('div');
    panel.style.cssText = 'position:fixed;left:1rem;bottom:8rem;z-index:70;background:#000;color:#0f0;font:12px monospace;padding:.6rem .8rem;border-radius:4px;max-width:70vw;max-height:40vh;overflow:auto;';
    panel.innerHTML = '<div>TAG MODE — press T or tap to log time</div><div id="tag-log"></div>';
    document.body.appendChild(panel);
    const log = panel.querySelector('#tag-log');
    const tag = () => { const t = audio.currentTime.toFixed(2); const row = document.createElement('div'); row.textContent = t; log.appendChild(row); console.log('tag:', t); };
    panel.addEventListener('click', tag);
    window.addEventListener('keydown', e => { if (e.key.toLowerCase() === 't') tag(); });
  }

  /* ---------------------------------------------------------------------
   * BOOT
   * ------------------------------------------------------------------- */
  window.togglePlay = togglePlay;

  buildStage();
  renderFrame(0);
  if (devTagMode) setupTagMode();
})();
</script>
