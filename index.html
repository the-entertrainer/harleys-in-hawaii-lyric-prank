<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>for you</title>
<meta name="description" content="A little letter, sung in ink.">
<meta name="theme-color" content="#efe2c8">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%23efe2c8"/><text x="16" y="23" font-size="18" text-anchor="middle">❤️</text></svg>'>
<link rel="preload" href="/fonts/cormorant-garamond-500.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/cormorant-garamond-500-italic.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/fonts/great-vibes-400.woff2" as="font" type="font/woff2" crossorigin>
</head>
<body class="preload">

<!-- rough ink edges: a tiny displacement everything written passes through -->
<svg width="0" height="0" aria-hidden="true" style="position:absolute">
  <filter id="inkbleed" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="1" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="1.4"/>
  </filter>
</svg>

<audio id="track" src="audio/let-me-call-you-sweetheart.mp3" preload="auto"></audio>

<div id="sheet">
  <div id="paper" aria-hidden="true"></div>
  <div id="frame" aria-hidden="true"><span>&#10086;</span><span>&#10086;</span><span>&#10086;</span><span>&#10086;</span></div>
  <main id="letter" aria-live="polite"></main>
  <button id="seal" aria-label="Open the letter and play">
    <span class="seal-heart" aria-hidden="true">&#10084;</span>
  </button>
  <p id="seal-hint" aria-hidden="true"></p>
  <div id="quill-line" aria-hidden="true"><i id="quill-fill"></i></div>
</div>

<canvas id="ink-canvas" aria-hidden="true"></canvas>

<script type="module" src="/src/main.js"></script>
</body>
</html>
