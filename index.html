<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Sweetheart</title>
<meta name="description" content="A Theatre.js-choreographed lyric page for a 1910 love song. One button. Press play.">
<meta name="theme-color" content="#2a1a33">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#2a1a33; --bg2:#4a1e3a; --bg3:#7a2f4a;
    --ink:#fff6f0; --ink-dim:#e7c9d6; --ink-faint:#a986a0;
    --accent:#ff8fb3; --accent-glow:#ff8fb355;
    --glass:rgba(255,255,255,.07); --glass-line:rgba(255,255,255,.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg1);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    overflow:hidden;
    touch-action:none;
    position:relative;
    min-height:100vh;
  }
  ::selection{background:var(--accent);color:#2a1a33;}

  /* ---------- BACKGROUND — soft animated aurora gradient, no imagery ---------- */
  #bg{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(60% 50% at 20% 20%, var(--bg3), transparent 70%),
      radial-gradient(70% 60% at 85% 80%, var(--bg2), transparent 70%),
      linear-gradient(160deg, var(--bg1), #1a1220);
    background-size:200% 200%, 200% 200%, 100% 100%;
    animation:aurora 22s ease-in-out infinite;
  }
  @keyframes aurora{
    0%,100%{ background-position:0% 30%, 100% 70%, 0 0; }
    50%{ background-position:40% 60%, 60% 30%, 0 0; }
  }
  #grain{
    position:fixed; inset:0; z-index:1; pointer-events:none; opacity:.05; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  #vignette{
    position:fixed; inset:0; z-index:2; pointer-events:none;
    background:radial-gradient(120% 90% at 50% 45%, transparent 45%, rgba(10,6,14,.55) 100%);
  }
  @media (prefers-reduced-motion: reduce){ #bg{ animation:none; } }

  /* ---------- PROGRESS ---------- */
  #progress{
    position:fixed; left:0; right:0; top:0; height:3px; z-index:40;
    background:rgba(255,255,255,.08);
  }
  #progress-fill{ position:absolute; left:0; top:0; bottom:0; width:0%; background:linear-gradient(90deg,var(--accent),#ffd08f); }

  /* ---------- STAGE ---------- */
  #stage{ position:fixed; inset:0; z-index:3; overflow:hidden; transition:opacity .6s ease; }
  #stage.hidden{ opacity:0; }
  #stack{ position:absolute; left:0; right:0; top:50%; max-width:920px; margin:0 auto; height:0; }
  .line-slot{
    position:absolute; left:50%; top:0; width:100%; padding:0 1.75rem;
    text-align:center; will-change:transform, opacity, filter;
    transform-origin:center;
  }
  .section-tag{
    font-family:'Inter',sans-serif; font-size:.72rem; letter-spacing:.28em; text-transform:uppercase;
    color:var(--accent); opacity:.75; margin-bottom:.9rem; font-weight:600;
  }
  .lyric-line{
    display:inline-block; font-family:'Fraunces',serif; font-weight:700; line-height:1.15;
    font-size:clamp(2rem, 7vw, 4.4rem);
    color:var(--ink);
    text-wrap:balance;
  }
  .lyric-line.spoken{ font-weight:500; font-style:italic; font-size:clamp(1.2rem,3.6vw,1.7rem); color:var(--ink-dim); }

  /* ---------- WORDS — sung in real time from actual word-level timestamps ---------- */
  .word{
    display:inline-block; color:var(--ink-faint); transition:color .22s ease;
    --underline:var(--ink);
    background-image:linear-gradient(var(--underline),var(--underline));
    background-repeat:no-repeat; background-position:0 100%;
    background-size:var(--fill,0%) .1em;
    padding-bottom:.06em;
  }
  .word.is-now{ color:var(--ink); animation:word-pop .35s ease-out; }
  .word.is-sung{ color:var(--ink); background-size:100% .1em; }
  .word.word-special{ --underline:var(--accent); color:#e0a8c0; }
  .word.word-special.is-now, .word.word-special.is-sung{ color:var(--accent); text-shadow:0 0 18px var(--accent-glow); }
  @keyframes word-pop{ 0%{ transform:scale(.9); } 55%{ transform:scale(1.08); } 100%{ transform:scale(1); } }
  @media (prefers-reduced-motion: reduce){
    .word{ transition:none !important; }
    .word.is-now{ animation:none !important; }
  }

  /* ---------- ACCENT ASSETS — sourced GIFs/transparent PNGs, Theatre-choreographed ---------- */
  .asset-wrap{
    position:absolute; top:50%; pointer-events:none; z-index:1;
    width:clamp(84px, 13vw, 150px);
    filter:drop-shadow(0 10px 26px rgba(0,0,0,.35));
  }
  .asset-wrap img{ width:100%; height:auto; display:block; }
  .asset-wrap.side-left{ left:clamp(10px, 3vw, 60px); }
  .asset-wrap.side-right{ right:clamp(10px, 3vw, 60px); }
  .asset-wrap.tier-ambient{ width:clamp(64px, 9vw, 108px); }

  #intro-vinyl{
    position:fixed; left:50%; top:50%; z-index:1; width:150px; margin:-75px 0 0 -75px;
    pointer-events:none; filter:drop-shadow(0 12px 30px rgba(0,0,0,.4));
  }
  #intro-vinyl img{ width:100%; display:block; }

  /* ---------- PLAY BUTTON ---------- */
  #play-btn{
    position:fixed; left:50%; bottom:6vh; z-index:50;
    width:78px; height:78px; margin-left:-39px;
    border:none; cursor:pointer; padding:0; border-radius:50%;
    background:linear-gradient(155deg, var(--accent), #c65a86);
    box-shadow:0 12px 30px rgba(255,143,179,.35), inset 0 1px 1px rgba(255,255,255,.4);
    -webkit-tap-highlight-color:transparent;
    transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  #play-btn:active{ transform:scale(.9); }
  #play-btn::before{
    content:''; position:absolute; inset:-8px; border-radius:50%;
    border:1.5px solid var(--glass-line); opacity:.6;
  }
  .icon-wrap{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#2a1220; }
  .icon-wrap svg{ width:26px; height:26px; transition:opacity .25s ease, transform .35s cubic-bezier(.34,1.56,.64,1); }
  #icon-play{ transform:translateX(2px); }
  #icon-pause{ opacity:0; transform:scale(.6); position:absolute; }
  #play-btn.is-playing #icon-play{ opacity:0; transform:scale(.6); }
  #play-btn.is-playing #icon-pause{ opacity:1; transform:scale(1); }

  /* ---------- FINALE ---------- */
  #finale{
    position:fixed; inset:0; z-index:48;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.1rem;
    pointer-events:none; opacity:0; transition:opacity 1s ease;
    background:radial-gradient(closest-side, rgba(255,143,179,.16), transparent 70%);
  }
  #finale.visible{ opacity:1; pointer-events:auto; }
  #finale img{
    width:96px; opacity:0; transform:scale(.4);
    transition:opacity .7s ease .2s, transform .9s cubic-bezier(.34,1.56,.64,1) .2s;
    filter:drop-shadow(0 10px 22px rgba(255,143,179,.4));
  }
  #finale.visible img{ opacity:1; transform:scale(1); }
  .finale-text{ text-align:center; font-family:'Fraunces',serif; }
  .finale-text span{
    display:block; opacity:0; transform:translateY(20px);
    transition:opacity .8s ease, transform .8s cubic-bezier(.34,1.56,.64,1);
  }
  .finale-text .line1{ font-size:clamp(1.2rem,4vw,1.7rem); font-weight:500; color:var(--ink-dim); transition-delay:.9s; }
  .finale-text .line2{ font-size:clamp(2.2rem,7vw,3.6rem); font-weight:700; color:var(--accent); transition-delay:1.15s; }
  #finale.visible .finale-text span{ opacity:1; transform:translateY(0); }

  @media (prefers-reduced-motion: reduce){
    #finale, #finale img, .finale-text span, #play-btn{ transition-duration:.25s !important; }
  }
</style>
</head>
<body>

<div id="bg"></div>
<div id="grain"></div>
<div id="vignette"></div>
<div id="progress"><div id="progress-fill"></div></div>

<audio id="track" src="audio/let-me-call-you-sweetheart.mp3" preload="metadata"></audio>

<div id="intro-vinyl"><img src="assets/gif/vinyl-record.gif" alt="" loading="eager"></div>

<main id="stage"><div id="stack"></div></main>

<div id="finale">
  <img src="assets/gif/heart-beat.gif" alt="">
  <div class="finale-text">
    <span class="line1">From Naveen,</span>
    <span class="line2">with love</span>
  </div>
</div>

<button id="play-btn" onclick="togglePlay()" aria-label="Play">
  <span class="icon-wrap">
    <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
  </span>
</button>

<script type="module">
import core from 'https://esm.sh/@theatre/core@0.7.2';
import { LYRICS, buildTimeline, TOTAL_DURATION, GAP_ASSETS, assetPath } from './lyrics-data.mjs';
const { getProject } = core;

const audio = document.getElementById('track');
const stack = document.getElementById('stack');
const stageEl = document.getElementById('stage');
const progressFill = document.getElementById('progress-fill');
const playBtn = document.getElementById('play-btn');
const finaleEl = document.getElementById('finale');
const introVinyl = document.getElementById('intro-vinyl');

const TIMELINE = buildTimeline(LYRICS, TOTAL_DURATION);

// Placeholder until main() finishes loading the Theatre.js state, in case a
// visitor manages to click before the (small, local) fetch resolves.
window.togglePlay = () => {};

// Line slots are centered (left:50%) so they need translate(-50%,-50%) to
// stay anchored; asset wraps live directly under #stage and are already
// edge-anchored horizontally (left/right clamp), so only their vertical
// centering should come from the transform, or Theatre's own x/y would
// double-offset them.
function applyTransform(el, v, { centerX = true } = {}){
  if (!v) return;
  const x = v.x || 0, y = v.y || 0, scale = v.scale ?? 1, rotate = v.rotate || 0;
  const tx = centerX ? `calc(-50% + ${x}px)` : `${x}px`;
  el.style.transform = `translate(${tx}, calc(-50% + ${y}px)) scale(${scale}) rotate(${rotate}deg)`;
  el.style.opacity = v.opacity ?? 1;
  if (v.blur !== undefined) el.style.filter = v.blur > 0.05 ? `blur(${v.blur}px)` : 'none';
}

/**
 * Real timing data (word-level, transcription-grounded — see ATTRIBUTION.md)
 * from lyrics-data.mjs. Real choreography (position/opacity/scale/rotate/blur
 * for every line, accent asset, and ambient floater) from a genuine Theatre.js
 * sequence in assets/theatre-state.json (generated by
 * tools/build-theatre-state.mjs — see that file for why it's generated rather
 * than hand-authored in Theatre.js Studio's visual editor). Rendering here is
 * just: scrub `sheet.sequence.position` to audio.currentTime every frame, and
 * apply whatever values each object's onValuesChange hands back. No custom
 * per-frame motion math lives in this file anymore.
 */
async function main(){
  const state = await (await fetch('assets/theatre-state.json')).json();
  const project = getProject('My Sweetheart', { state });
  const sheet = project.sheet('Lyrics');
  await project.ready;

  const introObj = sheet.object('intro-vinyl', { opacity:0, scale:1 });
  introObj.onValuesChange(v => {
    introVinyl.style.opacity = v.opacity;
    introVinyl.style.transform = `translate(-50%,-50%) scale(${v.scale})`;
  });

  let lineIndex = 0;
  const wordWatchers = [];

  // A randomized subset of emotionally-loaded words gets a pink highlight
  // instead of plain ink, re-rolled on every page load.
  const STOP_WORDS = new Set(['the','a','an','of','in','on','with','that','so','just','still','it','by','me','you','i','am','our']);
  const PRIORITY_WORDS = new Set(['sweetheart','love','true','dreaming','dreams','dream','moonlight','whisper','sweetheart?']);
  function randomizeAccents(wordEls){
    for (const wd of wordEls){
      const clean = wd.el.textContent.toLowerCase().replace(/[.,!?"']/g, '');
      if (STOP_WORDS.has(clean)) continue;
      const chance = PRIORITY_WORDS.has(clean) ? 0.8 : 0.28;
      wd.el.classList.toggle('word-special', Math.random() < chance);
    }
  }

  TIMELINE.forEach((entry) => {
    if (entry.type === 'gap'){
      const key = entry.start.toFixed(2);
      const cue = GAP_ASSETS[key];
      if (!cue) return;
      const obj = sheet.object(`gap-${key}`, { opacity:0, scale:1, rotate:0 });
      const wrap = document.createElement('div');
      wrap.className = `asset-wrap side-${cue.side}`;
      wrap.innerHTML = `<img src="${assetPath(cue.asset)}" alt="" loading="lazy">`;
      wrap.style.top = (32 + (lineIndex % 3) * 14) + '%';
      stageEl.appendChild(wrap);
      obj.onValuesChange(v => applyTransform(wrap, v, { centerX:false }));
      return;
    }

    const i = lineIndex++;
    const el = document.createElement('div');
    el.className = 'line-slot';

    if (entry.section){
      const tag = document.createElement('div');
      tag.className = 'section-tag';
      tag.textContent = entry.section;
      el.appendChild(tag);
    }

    const lineEl = document.createElement('div');
    lineEl.className = 'lyric-line' + (entry.type === 'spoken' ? ' spoken' : '');
    const wordEls = [];
    (entry.words || []).forEach((w, wi) => {
      const span = document.createElement('span');
      span.className = 'word';
      span.textContent = w.w;
      lineEl.appendChild(span);
      if (wi < entry.words.length - 1) lineEl.appendChild(document.createTextNode(' '));
      wordEls.push({ el: span, start: w.s, end: w.e });
    });
    el.appendChild(lineEl);
    stack.appendChild(el);

    const lineObj = sheet.object(`line-${i}`, { x:0, y:0, opacity:1, scale:1, rotate:0, blur:0 });
    lineObj.onValuesChange(v => applyTransform(el, v));

    if (entry.asset){
      const wrap = document.createElement('div');
      wrap.className = `asset-wrap side-${entry.side || 'left'} tier-${entry.tier || 'accent'}`;
      wrap.style.top = (30 + (i % 4) * 12) + '%';
      wrap.innerHTML = `<img src="${assetPath(entry.asset)}" alt="" loading="lazy">`;
      stageEl.appendChild(wrap);
      const assetObj = sheet.object(`asset-${i}`, { opacity:0, scale:1, rotate:0 });
      assetObj.onValuesChange(v => applyTransform(wrap, v, { centerX:false }));
    }

    randomizeAccents(wordEls);
    wordWatchers.push({ start: entry.start, end: entry.end, words: wordEls });
  });

  // ------------------------------------------------------------------
  // Word-by-word highlight — a discrete progress wipe per real timestamp,
  // not a tween, so it stays plain per-frame comparison rather than a
  // Theatre.js track.
  // ------------------------------------------------------------------
  function renderWords(t){
    for (const line of wordWatchers){
      if (t < line.start - 3 || t > line.end + 3) continue;
      for (const wd of line.words){
        const isNow = t >= wd.start && t < wd.end;
        const isSung = t >= wd.end;
        wd.el.classList.toggle('is-now', isNow);
        wd.el.classList.toggle('is-sung', isSung && !isNow);
      }
    }
  }

  let rafId = null;
  function frame(){
    const t = audio.currentTime;
    sheet.sequence.position = t;
    renderWords(t);
    progressFill.style.width = (t / TOTAL_DURATION * 100).toFixed(2) + '%';
    rafId = requestAnimationFrame(frame);
  }

  window.togglePlay = function(){
    if (audio.paused){
      finaleEl.classList.remove('visible');
      stageEl.classList.remove('hidden');
      if (audio.ended || audio.currentTime >= TOTAL_DURATION - 0.05) audio.currentTime = 0;
      audio.play();
      playBtn.classList.add('is-playing');
      if (!rafId) frame();
    } else {
      audio.pause();
      playBtn.classList.remove('is-playing');
    }
  };

  audio.addEventListener('ended', () => {
    playBtn.classList.remove('is-playing');
    stageEl.classList.add('hidden');
    finaleEl.classList.add('visible');
    if (rafId){ cancelAnimationFrame(rafId); rafId = null; }
  });

  // Render the very first frame (t=0) immediately so the page isn't blank
  // before the visitor presses play.
  sheet.sequence.position = 0;
  renderWords(0);
}

main().catch(err => console.error('Theatre.js init failed:', err));
</script>
</body>
</html>
